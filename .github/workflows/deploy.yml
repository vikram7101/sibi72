name: Deploy Website via SSM

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1   # ✅ change if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ Deploy via SSM (robust method)
      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy latest website code" \
            --parameters 'commands=[
              "cd /var/www",
              "which git || sudo yum install -y git",

              "sudo rm -rf html_new",
              "git clone https://github.com/vikram7101/sibi72.git html_new",

              "sudo rm -rf /var/www/html/*",
              "sudo cp -r html_new/* /var/www/html/",

              "sudo rm -rf html_new",

              "sudo chown -R apache:apache /var/www/html",

              "sudo systemctl restart httpd"
            ]'
